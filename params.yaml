preprocess:
  # Données brutes (source). Peut être un chemin S3 ou local (data/raw/data.csv).
  input: s3://m1-2026-mlops-project-group1/data/raw/data.csv
  # Sortie des données prétraitées (poussée sur S3).
  output: s3://m1-2026-mlops-project-group1/data/processed/data_processed.csv
  test_size: 0.2
  random_state: 42

train:
  data: s3://m1-2026-mlops-project-group1/data/processed/data_processed.csv
  model_path: models/model.pkl
  target_column: Outcome          # nom de la colonne cible (à adapter au dataset)
  # Hyperparamètres du RandomForest
  n_estimators: 200
  max_depth: 8
  min_samples_split: 2

evaluate:
  model_path: models/model.pkl
  data_path: s3://m1-2026-mlops-project-group1/data/processed/data_processed.csv
  target_column: Outcome

aws:
  # Laisse vide si tu utilises `aws configure` (recommandé).
  aws_access_key_id: ""
  aws_secret_access_key: ""
  region_name: "ap-northeast-1"

mlflow:
  MLFLOW_TRACKING_URI: "http://54.95.120.104:5000"
