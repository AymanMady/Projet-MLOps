<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prédiction Diabète — MLOps SupNum</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text);
           margin: 0; padding: 2rem; }
    .card { max-width: 620px; margin: auto; background: var(--card); padding: 2rem;
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
    h1 { margin-top: 0; font-size: 1.5rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    label { display: block; font-size: .8rem; margin-bottom: .3rem; color: #94a3b8; }
    input { width: 100%; padding: .6rem; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: var(--text); }
    button { margin-top: 1.5rem; width: 100%; padding: .9rem; border: none; border-radius: 10px;
             background: var(--accent); color: #082f49; font-weight: 700; font-size: 1rem;
             cursor: pointer; }
    button:hover { opacity: .9; }
    .result { margin-top: 1.5rem; padding: 1rem; border-radius: 10px; text-align: center;
              font-size: 1.2rem; font-weight: 700; background: #064e3b; }
    .error { background: #7f1d1d; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🩺 Prédiction du Diabète</h1>
    <p style="color:#94a3b8">Modèle chargé depuis le MLflow Model Registry.</p>
    <form method="POST">
      <div class="grid">
        {% for f in features %}
        <div>
          <label for="{{ f }}">{{ f }}</label>
          <input type="number" step="any" id="{{ f }}" name="{{ f }}" required>
        </div>
        {% endfor %}
      </div>
      <button type="submit">Prédire</button>
    </form>

    {% if prediction %}
      <div class="result">Résultat : {{ prediction }}</div>
    {% endif %}
    {% if error %}
      <div class="result error">{{ error }}</div>
    {% endif %}
  </div>
</body>
</html>
